engineStrict: true
nodeLinker: hoisted

allowBuilds:
  "@sentry/cli": true
  better-sqlite3: true
  electron: true
  electron-winstaller: true
  esbuild: true
  supabase: true

overrides:
  esbuild@<=0.24.2: ">=0.25.0"
  tar@<7.5.7: ">=7.5.7"
  tar@<=7.5.2: ">=7.5.3"
  tar@<=7.5.3: ">=7.5.4"
  tmp@<=0.2.3: ">=0.2.4"

minimumReleaseAgeExclude:
  - '@vitest/coverage-v8@4.1.7'
  - '@vitest/pretty-format@4.1.7'
  - '@vitest/utils@4.1.7'
