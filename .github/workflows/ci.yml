name: CI

on:
  pull_request:
    paths-ignore:
      - "**/*.md"
      - "!.changeset/**"
      - ".env.example"
      - "LICENSE"
      - ".gitignore"
  push:
    branches: [master]
    paths-ignore:
      - "**/*.md"
      - "!.changeset/**"
      - ".env.example"
      - "LICENSE"
      - ".gitignore"

# Cancel in-progress runs for the same branch/PR.  When a dependabot PR is
# rebased after merging a sibling, the previous (now stale) run is cancelled
# instead of burning through minutes.
concurrency:
  group: ci-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  pull-requests: read

env:
  CI: true

jobs:
  lint:
    name: Lint
    if: "!contains(github.event.head_commit.message, '[ci] release')"
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup pnpm
        uses: pnpm/action-setup@v5

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm

      - name: Install dependencies
        run: pnpm install

      - name: Run Biome checks
        run: pnpm check

  typecheck:
    name: Typecheck
    if: "!contains(github.event.head_commit.message, '[ci] release')"
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup pnpm
        uses: pnpm/action-setup@v5

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm

      - name: Install dependencies
        run: pnpm install

      - name: Run type checks
        run: pnpm typecheck

  changes:
    name: Detect Changes
    runs-on: ubuntu-latest
    if: "!contains(github.event.head_commit.message, '[ci] release')"
    outputs:
      app-code: ${{ steps.filter.outputs.app-code }}
      supabase-db: ${{ steps.filter.outputs.supabase-db }}
      supabase-edge: ${{ steps.filter.outputs.supabase-edge }}
      dep-supabase: ${{ steps.deps.outputs.supabase }}
      dep-kysely: ${{ steps.deps.outputs.kysely }}
      dep-better-sqlite3: ${{ steps.deps.outputs.better-sqlite3 }}
      dep-electron: ${{ steps.deps.outputs.electron }}
      has-better-sqlite3-change: ${{ steps.pkg-diff.outputs.better-sqlite3 }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 2

      - name: Detect file changes
        id: filter
        uses: dorny/paths-filter@v4
        with:
          filters: |
            app-code:
              - 'main/**'
              - 'renderer/**'
              - 'vitest.*.config.*'
            supabase-db:
              - 'supabase/migrations/**'
              - 'supabase/tests/**'
              - 'supabase/seed.sql'
              - 'supabase/config.toml'
            supabase-edge:
              - 'supabase/functions/**'

      - name: Detect dependency updates
        id: deps
        run: |
          BRANCH="${{ github.head_ref }}"
          echo "Branch: $BRANCH"

          if echo "$BRANCH" | grep -qi 'supabase'; then
            echo "supabase=true" >> $GITHUB_OUTPUT
          else
            echo "supabase=false" >> $GITHUB_OUTPUT
          fi

          if echo "$BRANCH" | grep -qi 'kysely'; then
            echo "kysely=true" >> $GITHUB_OUTPUT
          else
            echo "kysely=false" >> $GITHUB_OUTPUT
          fi

          if echo "$BRANCH" | grep -qi 'better-sqlite3'; then
            echo "better-sqlite3=true" >> $GITHUB_OUTPUT
          else
            echo "better-sqlite3=false" >> $GITHUB_OUTPUT
          fi

          if echo "$BRANCH" | grep -qi 'electron'; then
            echo "electron=true" >> $GITHUB_OUTPUT
          else
            echo "electron=false" >> $GITHUB_OUTPUT
          fi

      - name: Check package.json diff for actual dependency changes
        id: pkg-diff
        run: |
          if git diff HEAD~1 -- package.json | grep -q '"better-sqlite3"'; then
            echo "better-sqlite3=true" >> $GITHUB_OUTPUT
          else
            echo "better-sqlite3=false" >> $GITHUB_OUTPUT
          fi

  compat-guard:
    name: Electron ↔ better-sqlite3 Compatibility Guard
    needs: [changes]
    if: >-
      needs.changes.outputs.dep-electron == 'true' &&
      needs.changes.outputs.dep-better-sqlite3 != 'true' &&
      needs.changes.outputs.has-better-sqlite3-change != 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Block Electron bump without better-sqlite3
        run: |
          echo "::error::This PR bumps Electron without a corresponding better-sqlite3 update."
          echo ""
          echo "Electron major bumps change the Node/ABI version, which requires a"
          echo "compatible better-sqlite3 build. Please ensure better-sqlite3 also"
          echo "supports the new Electron version before merging."
          echo ""
          echo "Options:"
          echo "  1. Wait for a better-sqlite3 release that supports the new Electron ABI."
          echo "  2. Manually create a PR that bumps both electron AND better-sqlite3 together."
          echo "  3. Comment '@dependabot ignore electron major version' to skip this major."
          exit 1

  test-unit:
    name: Unit Tests (${{ matrix.suite }})
    needs: [lint, typecheck, changes]
    if: >-
      always() &&
      !contains(github.event.head_commit.message, '[ci] release') &&
      needs.lint.result == 'success' &&
      needs.typecheck.result == 'success' &&
      (
        needs.changes.outputs.app-code == 'true' ||
        needs.changes.outputs.dep-supabase == 'true' ||
        needs.changes.outputs.dep-kysely == 'true' ||
        needs.changes.outputs.dep-better-sqlite3 == 'true' ||
        needs.changes.outputs.dep-electron == 'true'
      )
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        suite:
          - main
          - renderer
        include:
          - suite: main
            config: vitest.main.config.mts
          - suite: renderer
            config: vitest.renderer.config.mts
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup pnpm
        uses: pnpm/action-setup@v5

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm

      - name: Install dependencies
        run: pnpm install

      - name: Run ${{ matrix.suite }} tests
        run: pnpm vitest run --config ${{ matrix.config }}

  test-edge:
    name: Edge Function Tests (Deno)
    needs: [lint, typecheck, changes]
    if: >-
      always() &&
      !contains(github.event.head_commit.message, '[ci] release') &&
      needs.lint.result == 'success' &&
      needs.typecheck.result == 'success' &&
      (
        needs.changes.outputs.supabase-edge == 'true' ||
        needs.changes.outputs.dep-supabase == 'true'
      )
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup Deno
        uses: denoland/setup-deno@v2
        with:
          deno-version: v2.x

      - name: Run edge function tests
        run: deno test --allow-all --config supabase/functions/deno.json supabase/functions/tests/

  test-db:
    name: Database Tests (pgTAP)
    needs: [lint, typecheck, changes]
    if: >-
      always() &&
      !contains(github.event.head_commit.message, '[ci] release') &&
      needs.lint.result == 'success' &&
      needs.typecheck.result == 'success' &&
      (
        needs.changes.outputs.supabase-db == 'true' ||
        needs.changes.outputs.dep-supabase == 'true'
      )
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup pnpm
        uses: pnpm/action-setup@v5

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm

      - name: Install dependencies
        run: pnpm install

      - name: Start Supabase (DB only)
        run: pnpx supabase start -x gotrue,realtime,storage-api,imgproxy,studio,edge-runtime,logflare,vector,supavisor,inbucket,pg_meta

      - name: Run database tests
        run: pnpx supabase test db

      - name: Stop Supabase
        if: always()
        run: pnpx supabase stop --no-backup

  build:
    name: Build Check
    needs: [lint, typecheck]
    if: "!contains(github.event.head_commit.message, '[ci] release')"
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup pnpm
        uses: pnpm/action-setup@v5

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm

      - name: Install dependencies
        run: pnpm install

      - name: Package app (dry run)
        run: pnpm package

  smoke-test:
    name: Startup Smoke Test
    needs: [lint, typecheck]
    if: "!contains(github.event.head_commit.message, '[ci] release')"
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup pnpm
        uses: pnpm/action-setup@v5

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm

      - name: Install dependencies
        run: pnpm install

      - name: Package app
        run: pnpm package

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y xvfb

      - name: Launch packaged binary
        run: |
          BINARY="out/Soothsayer-linux-x64/soothsayer"
          if [ ! -f "$BINARY" ]; then
            echo "::error::Packaged binary not found at $BINARY"
            exit 1
          fi

          # Launch the app under Xvfb and capture all output.  Instead of a
          # fixed sleep we poll the log for one of two signals:
          #   ✓ "[Init] All services initialized successfully" — app booted
          #   ✗ "Uncaught Exception" — main process crashed
          # A 60 s timeout acts as a safety net for unexpectedly slow runners.
          LOG=$(mktemp)
          xvfb-run --auto-servernum "$BINARY" --no-sandbox >"$LOG" 2>&1 &
          PID=$!
          echo "Launched packaged app (PID $PID), polling for startup result…"

          TIMEOUT=60
          ELAPSED=0
          RESULT=""
          while [ "$ELAPSED" -lt "$TIMEOUT" ]; do
            if grep -q "Uncaught Exception" "$LOG" 2>/dev/null; then
              RESULT="crash"
              break
            fi
            if grep -q "All services initialized successfully" "$LOG" 2>/dev/null; then
              RESULT="ok"
              break
            fi
            sleep 1
            ELAPSED=$((ELAPSED + 1))
          done

          # Dump raw output for CI visibility
          echo "── App output ──"
          cat "$LOG"
          echo "────────────────"

          # Clean up the app process regardless of outcome
          kill "$PID" 2>/dev/null || true
          wait "$PID" 2>/dev/null || true

          # ── Build results table ──────────────────────────────────────
          # Check each expected signal in the log and build an ASCII table
          # for the console log, a markdown table for the GitHub Job Summary,
          # and per-check annotations for the GitHub Annotations section.
          FAILED=0
          SUMMARY_FILE=$(mktemp)

          W=46

          # Start the markdown summary table
          echo "### 🔥 Startup Smoke Test Results (${ELAPSED}s)" >> "$SUMMARY_FILE"
          echo "" >> "$SUMMARY_FILE"
          echo "| Status | Check |" >> "$SUMMARY_FILE"
          echo "|--------|-------|" >> "$SUMMARY_FILE"

          check() {
            local label="$1"
            local pattern="$2"
            if grep -q "$pattern" "$LOG" 2>/dev/null; then
              printf "│ ✅  │ %-${W}s │\n" "$label"
              echo "| ✅ | $label |" >> "$SUMMARY_FILE"
            else
              printf "│ ❌  │ %-${W}s │\n" "$label"
              echo "| ❌ | $label |" >> "$SUMMARY_FILE"
              echo "::error::Smoke Test: $label — FAILED"
              FAILED=$((FAILED + 1))
            fi
          }

          echo ""
          echo "┌──────┬────────────────────────────────────────────────┐"
          printf "│      │ %-${W}s │\n" "Smoke Test Results (${ELAPSED}s)"
          echo "├──────┼────────────────────────────────────────────────┤"

          check "No uncaught exceptions"          "All services initialized successfully"
          check "Migrations completed"            "All migrations completed successfully"
          check "Settings"                        "\[Init\] ✓ Settings"
          check "Database"                        "\[Init\] ✓ Database"
          check "Supabase"                        "\[Init\] .* Supabase"
          check "POE Leagues"                     "\[Init\] ✓ POE Leagues"
          check "Divination Cards"                "\[Init\] ✓ Divination Cards"
          check "Prohibited Library"              "\[Init\] ✓ Prohibited Library"
          check "Card Details"                    "\[Init\] ✓ Card Details"
          check "Snapshots"                       "\[Init\] ✓ Snapshots"
          check "Sessions"                        "\[Init\] ✓ Sessions"
          check "Analytics"                       "\[Init\] ✓ Analytics"
          check "CSV"                             "\[Init\] ✓ CSV"
          check "Overlay"                         "\[Init\] ✓ Overlay"
          check "Client Log Reader"               "\[Init\] ✓ Client Log Reader"
          check "All services initialized"        "All services initialized successfully"

          echo "├──────┼────────────────────────────────────────────────┤"

          # Check for individual migration failures
          if grep -q "\[Migrations\] ✗ Failed" "$LOG" 2>/dev/null; then
            printf "│ ❌  │ %-${W}s │\n" "Some migrations failed:"
            grep "\[Migrations\] ✗" "$LOG" | while read -r line; do
              printf "│      │   %-$((W - 2))s │\n" "$line"
            done
            echo "| ❌ | Some migrations failed |" >> "$SUMMARY_FILE"
            echo "::error::Smoke Test: Some migrations failed — see log for details"
            FAILED=$((FAILED + 1))
          else
            printf "│ ✅  │ %-${W}s │\n" "No individual migration failures"
            echo "| ✅ | No individual migration failures |" >> "$SUMMARY_FILE"
          fi

          echo "└──────┴────────────────────────────────────────────────┘"
          echo ""

          # Write the markdown summary to the GitHub Job Summary
          cat "$SUMMARY_FILE" >> "$GITHUB_STEP_SUMMARY"
          rm -f "$LOG" "$SUMMARY_FILE"

          # ── Final verdict ────────────────────────────────────────────
          case "$RESULT" in
            crash)
              echo "::error::Packaged app crashed during startup — see output above"
              exit 1
              ;;
            "")
              echo "::error::App did not produce a startup signal within ${TIMEOUT} s — see output above"
              exit 1
              ;;
          esac

          if [ "$FAILED" -gt 0 ]; then
            echo "::error::${FAILED} smoke test check(s) failed — see table above"
            exit 1
          fi

          echo "✓ All smoke test checks passed (${ELAPSED} s)"

  e2e:
    name: Electron E2E Tests
    needs: [smoke-test]
    if: "!contains(github.event.head_commit.message, '[ci] release')"
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup pnpm
        uses: pnpm/action-setup@v5

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm

      - name: Install dependencies
        run: pnpm install

      - name: Install system dependencies for Electron
        run: |
          sudo apt-get update
          sudo apt-get install -y xvfb fluxbox libnss3 libatk-bridge2.0-0 libgtk-3-0 libgbm1 libasound2t64

      - name: Build Electron main + preload for E2E
        run: node scripts/build-e2e.mjs

      - name: Run E2E tests
        env:
          E2E_TESTING: "true"
        run: |
          # Start Xvfb on a free display
          export DISPLAY=:99
          Xvfb $DISPLAY -screen 0 1920x1080x24 &
          sleep 1
          # A lightweight window manager is required so that Electron's
          # minimize()/maximize() X11 hints are actually processed.
          fluxbox &
          sleep 1
          pnpm exec playwright test --config playwright.config.ts
