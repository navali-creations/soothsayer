name: Publish

on:
  push:
    branches:
      - master
    paths:
      - "package.json"
  workflow_dispatch:
    inputs:
      version:
        description: "Expected package.json version to publish, for example 0.17.0"
        required: false
        type: string
      force:
        description: "Publish the current package.json version even if this commit did not bump it"
        required: false
        default: false
        type: boolean

permissions:
  contents: write

env:
  CI: true
  # Electron Forge currently fails to complete packaging on Node 24.16+.
  # Keep hosted packaging pinned until https://github.com/electron/forge/issues/4277 is fixed.
  NODE_VERSION: 24.15.0

jobs:
  check-version:
    name: Check if version changed
    runs-on: ubuntu-latest
    timeout-minutes: 2
    outputs:
      should_publish: ${{ steps.check.outputs.should_publish }}
      version: ${{ steps.check.outputs.version }}
    steps:
      - name: Checkout code repository
        uses: actions/checkout@v7
        with:
          fetch-depth: 2

      - name: Check version change
        id: check
        env:
          FORCE_PUBLISH: ${{ github.event_name == 'workflow_dispatch' && inputs.force || false }}
          REQUESTED_VERSION: ${{ github.event_name == 'workflow_dispatch' && inputs.version || '' }}
        run: |
          CURRENT_VERSION=$(node -p "require('./package.json').version")
          echo "Current version: $CURRENT_VERSION"
          echo "Force publish: $FORCE_PUBLISH"

          git show HEAD~1:package.json > /tmp/prev-package.json 2>/dev/null || echo '{"version":"0.0.0"}' > /tmp/prev-package.json
          PREVIOUS_VERSION=$(node -p "require('/tmp/prev-package.json').version")
          echo "Previous version: $PREVIOUS_VERSION"

          if [ -n "$REQUESTED_VERSION" ] && [ "$REQUESTED_VERSION" != "$CURRENT_VERSION" ]; then
            echo "::error::Requested version $REQUESTED_VERSION does not match package.json version $CURRENT_VERSION"
            echo "should_publish=false" >> $GITHUB_OUTPUT
            exit 1
          fi

          if [ "$CURRENT_VERSION" != "$PREVIOUS_VERSION" ]; then
            echo "Version changed from $PREVIOUS_VERSION to $CURRENT_VERSION"
            echo "should_publish=true" >> $GITHUB_OUTPUT
            echo "version=$CURRENT_VERSION" >> $GITHUB_OUTPUT
          elif [ "$FORCE_PUBLISH" = "true" ]; then
            echo "Version unchanged, but force publish was requested for $CURRENT_VERSION"
            echo "should_publish=true" >> $GITHUB_OUTPUT
            echo "version=$CURRENT_VERSION" >> $GITHUB_OUTPUT
          else
            echo "Version unchanged"
            echo "should_publish=false" >> $GITHUB_OUTPUT
          fi

  make:
    name: Build (${{ matrix.name }})
    needs: check-version
    if: needs.check-version.outputs.should_publish == 'true'
    timeout-minutes: 20

    strategy:
      fail-fast: true
      matrix:
        include:
          - name: ubuntu
            runs_on: ubuntu-latest
          - name: windows
            runs_on: windows-latest

    runs-on: ${{ matrix.runs_on }}

    defaults:
      run:
        shell: ${{ startsWith(matrix.name, 'windows') && 'powershell' || 'bash' }}

    steps:
      - name: Checkout code repository
        uses: actions/checkout@v7

      - name: Setup pnpm
        uses: pnpm/action-setup@v6
        with:
          dest: ${{ runner.temp }}/setup-pnpm

      - name: Setup node.js
        uses: actions/setup-node@v7
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      # Skip all lifecycle scripts during install to avoid supabase CLI download failures on Windows
      - name: Install dependencies (skip lifecycle scripts)
        run: pnpm install --frozen-lockfile --ignore-scripts

      # Rebuild only the packages needed for building the Electron app
      - name: Rebuild required dependencies
        run: pnpm rebuild better-sqlite3 electron esbuild

      # Rebuild electron-winstaller for Squirrel maker (Windows only)
      - name: Rebuild electron-winstaller for Squirrel (Windows only)
        if: startsWith(matrix.name, 'windows')
        run: pnpm rebuild electron-winstaller

      # Run root postinstall: electron-rebuild -f -w better-sqlite3
      - name: Rebuild better-sqlite3 for Electron ABI
        run: pnpm run postinstall

      - name: Create .env file (Linux)
        if: "!startsWith(matrix.name, 'windows')"
        shell: bash
        env:
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_PUBLISHABLE_KEY: ${{ secrets.VITE_SUPABASE_PUBLISHABLE_KEY }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}
          VITE_UMAMI_ID: ${{ secrets.VITE_UMAMI_ID }}
          VITE_SENTRY_DSN: ${{ secrets.SENTRY_DSN }}
        run: |
          if [ -z "$VITE_SUPABASE_PUBLISHABLE_KEY" ]; then
            echo "::error::VITE_SUPABASE_PUBLISHABLE_KEY secret is required for v2 Edge Functions"
            exit 1
          fi

          case "$VITE_SUPABASE_PUBLISHABLE_KEY" in
            sb_publishable_*) ;;
            *)
              echo "::error::VITE_SUPABASE_PUBLISHABLE_KEY must be a Supabase publishable key (sb_publishable_...)"
              exit 1
              ;;
          esac

          echo "VITE_SUPABASE_URL=$VITE_SUPABASE_URL" > .env
          echo "VITE_SUPABASE_PUBLISHABLE_KEY=$VITE_SUPABASE_PUBLISHABLE_KEY" >> .env
          echo "VITE_SUPABASE_ANON_KEY=$VITE_SUPABASE_ANON_KEY" >> .env
          echo "VITE_UMAMI_ID=$VITE_UMAMI_ID" >> .env
          echo "VITE_SENTRY_DSN=$VITE_SENTRY_DSN" >> .env

      - name: Create .env file (Windows)
        if: startsWith(matrix.name, 'windows')
        shell: powershell
        env:
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_PUBLISHABLE_KEY: ${{ secrets.VITE_SUPABASE_PUBLISHABLE_KEY }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}
          VITE_UMAMI_ID: ${{ secrets.VITE_UMAMI_ID }}
          VITE_SENTRY_DSN: ${{ secrets.SENTRY_DSN }}
        run: |
          if (-not $env:VITE_SUPABASE_PUBLISHABLE_KEY) {
            Write-Host "::error::VITE_SUPABASE_PUBLISHABLE_KEY secret is required for v2 Edge Functions"
            exit 1
          }

          if (-not $env:VITE_SUPABASE_PUBLISHABLE_KEY.StartsWith("sb_publishable_")) {
            Write-Host "::error::VITE_SUPABASE_PUBLISHABLE_KEY must be a Supabase publishable key (sb_publishable_...)"
            exit 1
          }

          # PowerShell 5.x -Encoding utf8 writes a BOM (EF BB BF) which
          # corrupts the first env-var name for Vite/dotenv.
          # Use .NET API to write BOM-free UTF-8.
          $lines = @(
            "VITE_SUPABASE_URL=$env:VITE_SUPABASE_URL"
            "VITE_SUPABASE_PUBLISHABLE_KEY=$env:VITE_SUPABASE_PUBLISHABLE_KEY"
            "VITE_SUPABASE_ANON_KEY=$env:VITE_SUPABASE_ANON_KEY"
            "VITE_UMAMI_ID=$env:VITE_UMAMI_ID"
            "VITE_SENTRY_DSN=$env:VITE_SENTRY_DSN"
          )
          $utf8NoBom = New-Object System.Text.UTF8Encoding($false)
          [System.IO.File]::WriteAllLines(
            (Join-Path $PWD '.env'),
            $lines,
            $utf8NoBom
          )

      # Linux build
      - name: Make distributables (Linux)
        if: "!startsWith(matrix.name, 'windows')"
        run: pnpm make
        env:
          SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}
      - name: Verify Linux distributables
        if: "!startsWith(matrix.name, 'windows')"
        shell: bash
        run: |
          echo "Linux build artifacts:"
          find out/make -maxdepth 4 -type f | sort

          APPIMAGE_COUNT=$(find out/make -type f -name "*.AppImage" | wc -l)
          if [ "$APPIMAGE_COUNT" -eq 0 ]; then
            echo "::error::No AppImage artifact found under out/make"
            exit 1
          fi

      # Windows build
      - name: Make distributables (Windows)
        if: startsWith(matrix.name, 'windows')
        run: pnpm make
        env:
          SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}

      # Post-build assertion: verify env vars were embedded
      # Guards against BOM corruption, missing secrets, or dotenv parse
      # failures that would silently ship a broken build.
      # See: docs/postmortems/2026-04-powershell-bom-supabase-env.md
      - name: Assert env vars embedded in bundle (Linux)
        if: "!startsWith(matrix.name, 'windows')"
        shell: bash
        run: |
          BUNDLE=".vite/build/main.js"
          if [ ! -f "$BUNDLE" ]; then
            echo "::error::Bundle not found at $BUNDLE"
            exit 1
          fi

          FAILED=0
          check_bundle() {
            local label="$1" pattern="$2" file="$3"
            if grep -q "$pattern" "$file"; then
              echo "[ok] $label is embedded in the bundle"
            else
              echo "::error::$label was NOT embedded in the bundle. The .env file may be corrupted (e.g. BOM prefix) or the secret is empty."
              FAILED=1
            fi
          }

          check_bundle "VITE_SUPABASE_URL"      "supabase\.co"  "$BUNDLE"
          check_bundle "VITE_SUPABASE_PUBLISHABLE_KEY" "sb_publishable_" "$BUNDLE"
          check_bundle "VITE_SENTRY_DSN"         "sentry\.io"    "$BUNDLE"

          RENDERER_DIR=".vite/renderer/main_window"
          RENDERER_TMP=$(mktemp)
          find "$RENDERER_DIR" -name '*.js' -exec cat {} + > "$RENDERER_TMP" 2>/dev/null
          if [ ! -s "$RENDERER_TMP" ]; then
            echo "::error::No renderer JS bundles found under $RENDERER_DIR"
            rm -f "$RENDERER_TMP"
            exit 1
          fi

          check_bundle "VITE_UMAMI_ID" "umami" "$RENDERER_TMP"
          rm -f "$RENDERER_TMP"

          if [ "$FAILED" -ne 0 ]; then
            exit 1
          fi

      - name: Assert env vars embedded in bundle (Windows)
        if: startsWith(matrix.name, 'windows')
        shell: powershell
        run: |
          $bundle = ".vite\build\main.js"
          if (-not (Test-Path $bundle)) {
            Write-Host "::error::Bundle not found at $bundle"
            exit 1
          }

          $content = [System.IO.File]::ReadAllText((Resolve-Path $bundle).Path)

          $failed = 0
          function Assert-Bundle($Label, $Pattern, $Content) {
            if ($Content -match $Pattern) {
              Write-Host "[ok] $Label is embedded in the bundle"
            } else {
              Write-Host "::error::$Label was NOT embedded in the bundle. The .env file may be corrupted (e.g. BOM prefix) or the secret is empty."
              $script:failed = 1
            }
          }

          Assert-Bundle "VITE_SUPABASE_URL"     "supabase\.co" $content
          Assert-Bundle "VITE_SUPABASE_PUBLISHABLE_KEY" "sb_publishable_" $content
          Assert-Bundle "VITE_SENTRY_DSN"        "sentry\.io"   $content

          $rendererDir = ".vite\renderer\main_window"
          if (-not (Test-Path $rendererDir)) {
            Write-Host "::error::Renderer bundle directory not found at $rendererDir"
            exit 1
          }
          $rendererContent = Get-ChildItem $rendererDir -Recurse -Filter "*.js" |
            ForEach-Object { [System.IO.File]::ReadAllText($_.FullName) }
          $rendererAll = $rendererContent -join "`n"

          Assert-Bundle "VITE_UMAMI_ID" "umami" $rendererAll

          if ($failed -ne 0) {
            exit 1
          }

      - name: Upload artifacts
        uses: actions/upload-artifact@v7
        with:
          name: distributables-${{ matrix.name }}
          path: out/make/**/*
          if-no-files-found: error

  release:
    name: Create GitHub Release
    needs: [check-version, make]
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout code repository
        uses: actions/checkout@v7

      - name: Extract release notes from CHANGELOG.md
        id: changelog
        shell: bash
        run: |
          VERSION="${{ needs.check-version.outputs.version }}"
          NOTES=$(tr -d '\r' < CHANGELOG.md | awk "BEGIN{found=0} /^## ${VERSION}$/{found=1; next} /^## /{if(found) exit} found{print}")
          echo "notes<<EOF" >> $GITHUB_OUTPUT
          echo "$NOTES" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Download all artifacts
        uses: actions/download-artifact@v8
        with:
          path: artifacts
          merge-multiple: true

      - name: Add stable download aliases
        shell: bash
        run: |
          set -euo pipefail

          copy_alias() {
            local pattern="$1"
            local alias="$2"
            local source

            source=$(find artifacts -type f -iname "$pattern" -print -quit)
            if [ -z "$source" ]; then
              echo "::error::Could not find release asset matching $pattern"
              echo "Available artifacts:"
              find artifacts -type f | sort
              exit 1
            fi

            cp "$source" "artifacts/$alias"
            echo "Created stable alias $alias from $source"
          }

          copy_alias "Soothsayer-*Setup.exe" "Soothsayer.Setup.exe"
          copy_alias "Soothsayer-*.AppImage" "Soothsayer.AppImage"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: v${{ needs.check-version.outputs.version }}
          name: Soothsayer v${{ needs.check-version.outputs.version }}
          body: ${{ steps.changelog.outputs.notes }}
          files: artifacts/**/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
